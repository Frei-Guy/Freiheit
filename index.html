<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CDK Approval Weapon V4</title>

<style>
body{margin:0;font-family:Arial;background:#050607;color:#fff}
.container{padding:15px;max-width:1400px;margin:auto}
.tabs{display:flex;gap:10px;margin-bottom:15px}
.tab{padding:10px 15px;border:1px solid #333;cursor:pointer}
.active{background:#0a84ff}
.card{background:#111;padding:15px;border:1px solid #333;margin-bottom:15px}
input,select{width:100%;padding:8px;margin-top:5px;background:#000;color:#fff;border:1px solid #444}
.row{display:grid;grid-template-columns:1fr 150px;gap:10px;margin-bottom:10px}
button{padding:10px;background:#0a84ff;border:none;color:white;cursor:pointer;margin-top:10px}
.hidden{display:none}
.big{font-size:28px;font-weight:bold}
</style>
</head>

<body>
<div class="container">

<div class="tabs">
<div class="tab active" onclick="showTab('structure')">Structure</div>
<div class="tab" onclick="showTab('analysis')">Analysis</div>
<div class="tab" onclick="showTab('lenders')">Lenders</div>
<div class="tab" onclick="showTab('recap')">Recap</div>
</div>

<!-- STRUCTURE -->
<div id="structure" class="card">
<h3>Deal Structure</h3>

<div class="row"><label>Book Value</label><input id="book" value="25000"></div>
<div class="row"><label>Selling Price</label><input id="sell" value="28000"></div>
<div class="row"><label>Fees</label><input id="fees" value="1200"></div>
<div class="row"><label>Rebate</label><input id="rebate" value="1500"></div>
<div class="row"><label>Cash</label><input id="cash" value="2000"></div>
<div class="row"><label>Negative Equity</label><input id="neg" value="3000"></div>
<div class="row"><label>Backend</label><input id="backend" value="4000"></div>

<div class="row"><label>Target Lender</label>
<select id="target"></select></div>

<button onclick="calc()">Update</button>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="card hidden">
<h3>Analysis</h3>
<div>Front-End LTV: <span id="feLtv" class="big"></span></div>
<div>Total LTV: <span id="totalLtv" class="big"></span></div>
<div>Backend Room: <span id="backendRoom"></span></div>
<div>Cash Needed: <span id="cashNeeded"></span></div>
<button onclick="structureDeal()">Structure This Deal</button>
</div>

<!-- LENDERS -->
<div id="lenders" class="card hidden">
<h3>Lender Database</h3>
<div id="lenderList"></div>
</div>

<!-- RECAP -->
<div id="recap" class="card hidden">
<h3>Deal Recap</h3>
<textarea id="recapBox" style="width:100%;height:200px"></textarea>
<button onclick="copyRecap()">Copy</button>
</div>

</div>

<script>
let lenders=[
{name:"CapOne",maxFe:120,maxTotal:135,maxBackend:5500},
{name:"Ally",maxFe:115,maxTotal:130,maxBackend:5000},
{name:"Chase",maxFe:110,maxTotal:125,maxBackend:4500}
];

function showTab(id){
document.querySelectorAll(".card").forEach(x=>x.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");
}

function loadLenders(){
let sel=document.getElementById("target");
sel.innerHTML=lenders.map((l,i)=>`<option value="${i}">${l.name}</option>`).join("");
document.getElementById("lenderList").innerHTML=lenders.map(l=>`${l.name} | FE:${l.maxFe}% | Total:${l.maxTotal}% | Backend:${l.maxBackend}`).join("<br>");
}

function calc(){
let book=+book.value;
let adjusted=+sell.value+ +fees.value;
let frontend=adjusted- +rebate.value- +cash.value+ +neg.value;
let total=frontend+ +backend.value;

let fe=frontend/book*100;
let tot=total/book*100;

feLtv.innerText=fe.toFixed(1)+"%";
totalLtv.innerText=tot.toFixed(1)+"%";

let l=lenders[target.value];
backendRoom.innerText="$"+(l.maxBackend-backend.value);
cashNeeded.innerText="$"+Math.max(0,total-(book*(l.maxTotal/100)));

recapBox.value=
`Front LTV: ${fe.toFixed(1)}%
Total LTV: ${tot.toFixed(1)}%
Best Lender: ${l.name}`;
}

function structureDeal(){
alert("Adjust cash, backend, or price to fit lender caps.");
}

function copyRecap(){
navigator.clipboard.writeText(recapBox.value);
alert("Copied");
}

loadLenders();
calc();
</script>

</body>
</html>
